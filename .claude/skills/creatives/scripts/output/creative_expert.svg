  <text x="766" y="778" font-family="Arial, sans-serif" font-size="20" fill="#E8E0E6">Always available, no extra fee</text>
  <circle cx="750" cy="806" r="5" fill="#DDF07E"/>
  <text x="766" y="812" font-family="Arial, sans-serif" font-size="20" fill="#E8E0E6">Pre-vetted auditor network</text>

