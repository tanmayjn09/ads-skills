  <text x="738" y="645" font-family="Arial, sans-serif" font-weight="800" font-size="28" fill="#DDF07E">Sprinto Expert</text>
  <text x="738" y="683" font-family="Arial, sans-serif" font-weight="700" font-size="26" fill="#E8E0E6">— Included</text>

