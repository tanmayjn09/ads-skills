  <circle cx="148" cy="680" r="48" fill="#FEE2E2"/>
  <!-- X lines -->
  <line x1="124" y1="656" x2="172" y2="704" stroke="#E53E3E" stroke-width="8" stroke-linecap="round"/>
  <line x1="172" y1="656" x2="124" y2="704" stroke="#E53E3E" stroke-width="8" stroke-linecap="round"/>

  <!-- Card label -->
