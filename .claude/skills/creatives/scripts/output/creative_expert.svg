  <rect x="830" y="584" width="156" height="40" rx="20" fill="#DDF07E"/>
  <text x="908" y="609" font-family="Arial, sans-serif" font-weight="800" font-size="17" fill="#1F0214" text-anchor="middle">✓ INCLUDED</text>

  <!-- VS divider between cards -->
  <circle cx="540" cy="742" r="30" fill="#1F0214"/>
  <text x="540" y="750" font-family="Arial, sans-serif" font-weight="800" font-size="20" fill="#F6F5F2" text-anchor="middle">VS</text>

  <!-- Stats row -->
  <rect x="48" y="940" width="300" height="80" rx="12" fill="#1F0214"/>
  <text x="198" y="972" font-family="Arial, sans-serif" font-weight="800" font-size="28" fill="#DDF07E" text-anchor="middle">2 Leads</text>
  <text x="198" y="1002" font-family="Arial, sans-serif" font-size="16" fill="#E8E0E6" text-anchor="middle">Dedicated Compliance Experts</text>

  <rect x="390" y="940" width="300" height="80" rx="12" fill="#1F0214"/>
  <text x="540" y="972" font-family="Arial, sans-serif" font-weight="800" font-size="28" fill="#DDF07E" text-anchor="middle">$0 Extra</text>
  <text x="540" y="1002" font-family="Arial, sans-serif" font-size="16" fill="#E8E0E6" text-anchor="middle">No Consultant Fees Ever</text>

  <rect x="732" y="940" width="300" height="80" rx="12" fill="#1F0214"/>
  <text x="882" y="972" font-family="Arial, sans-serif" font-weight="800" font-size="28" fill="#DDF07E" text-anchor="middle">100+</text>
  <text x="882" y="1002" font-family="Arial, sans-serif" font-size="16" fill="#E8E0E6" text-anchor="middle">Pre-Vetted Auditors</text>

  <!-- CTA Button -->
  <rect x="390" y="1042" width="300" height="56" rx="8" fill="#DDF07E"/>
  <text x="540" y="1077" font-family="Arial, sans-serif" font-weight="700" font-size="20" fill="#1F0214" text-anchor="middle">Book a Demo →</text>

