  <text x="48" y="418" font-family="Arial, sans-serif" font-weight="700" font-size="52" fill="#1F0214">No consultant fees.</text>

  <!-- Body text -->
  <text x="48" y="476" font-family="Arial, sans-serif" font-size="24" fill="#555555">Two dedicated compliance leads at no extra cost.</text>
  <text x="48" y="510" font-family="Arial, sans-serif" font-size="24" fill="#555555">Pre-vetted auditor network included.</text>

  <!-- Divider line -->
